/[providers]
  PHP = ["laravel"]

[phases.setup]
  nixPkgs = ['php83', 'nodejs']  # Remove nodejs if not needed

[phases.build]
  cmds = ['composer install --no-dev --optimize-autoloader', 'php artisan migrate:fresh --seed', 'php artisan config:cache', 'php artisan route:cache', 'php artisan view:cache']

[staticAssets]
  mountPath = '/public'

